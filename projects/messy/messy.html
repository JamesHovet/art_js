<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messy</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .main-container {
      display: flex;
      gap: 30px;
      align-items: flex-start;
      justify-content: center;
      margin: 20px;
    }
    .svg-wrapper {
      text-align: center;
    }
    .svg-background {
      position: relative;
      display: inline-block;
      width: 576px;
      height: 576px;
      background-color: rgb(245, 245, 245);
    }
    #controls-container {
      width: 250px;
      padding: 20px;
      background-color: #f9f9f9;
      border-radius: 8px;
      font-family: Arial, sans-serif;
    }
    #controls-container button {
      padding: 8px 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background-color: white;
      cursor: pointer;
      margin-bottom: 10px;
    }
    #controls-container button:hover {
      background-color: #f0f0f0;
    }
    #saveSVG {
      padding: 8px 16px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
    }
    #saveSVG:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="svg-wrapper">
      <div class="svg-background">
        <div id="messy-container"></div>
      </div>
    </div>
    <div id="controls-container"></div>
  </div>
  <nav>
    <a href="/spiral">Spiral</a> | <a href="/letters">Letters</a> | <a href="/messy">Messy</a>
  </nav>
</body>
</html>
