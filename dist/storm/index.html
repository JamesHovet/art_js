<!doctype html><html class="no-js" lang=""><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Storm</title><link rel="stylesheet" href="css/style.css"><link rel="icon" href="/favicon.ico" sizes="any"><link rel="icon" href="/icon.svg" type="image/svg+xml"><link rel="apple-touch-icon" href="icon.png"><style>body {
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .main-container {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .svg-background {
      position: relative;
      display: block;
      width: 1344px;
      height: 1056px;
      background-color: rgb(245, 245, 245);
      flex-shrink: 0;
    }

    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 340px;
      flex-shrink: 0;
    }

    #density-container {
      display: block;
      background-color: rgb(245, 245, 245);
      line-height: 0;
    }

    #controls-container {
      padding: 15px;
      background-color: #f9f9f9;
      border-radius: 8px;
      font-family: Arial, sans-serif;
      overflow-y: auto;
    }

    #controls-container input[type="range"] {
      width: 100%;
    }

    #saveSVG {
      padding: 8px 16px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
    }

    #saveSVG:hover {
      background-color: #0056b3;
    }</style><script defer="defer" src=".././js/storm.js"></script></head><body><div class="main-container"><div class="svg-background"><div id="storm-container"></div></div><div class="right-panel"><div id="density-container"></div><div id="controls-container"></div></div></div></body></html>
